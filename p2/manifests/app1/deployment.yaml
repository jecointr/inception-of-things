apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  namespace: iot-p2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
        - name: app1
          image: cnrock/2048:latest
          ports:
            - containerPort: 80
